; Allow very large file uploads (e.g., up to 2GB)
upload_max_filesize = 2048M
post_max_size = 2048M

; Memory usage for PHP scripts
memory_limit = 2048M   ; Increased to match upload size if processing large files in memory

; Execution time settings
max_execution_time = 600   ; Allow long-running uploads (10 minutes)
max_input_time = 600       ; Time allowed to parse input data

; Optional: file uploads on/off and max file uploads
file_uploads = On
max_file_uploads = 50      ; If you expect multiple file uploads

; Optional: increase default socket timeout
default_socket_timeout = 600
